services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
    depends_on:
      - frontend

  frontend:
    build: .
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build: ./backend
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - DB_PATH=/data/playground.db
      - PORT=3000
      - GO_RUNNER_IMAGE=${GO_RUNNER_IMAGE:-golang:1.21-alpine}
      - PYTHON_RUNNER_IMAGE=${PYTHON_RUNNER_IMAGE:-python:3.12-alpine}
      - RUN_TIMEOUT=${RUN_TIMEOUT:-60s}
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  caddy-data:
