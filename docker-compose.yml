# Development compose - no Caddy, direct port access
# Usage: docker compose up -d

services:
  frontend:
    build: .
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - DB_PATH=/data/playground.db
      - PORT=3000
      - GO_RUNNER_IMAGE=${GO_RUNNER_IMAGE:-golang:1.21-alpine}
      - RUN_TIMEOUT=${RUN_TIMEOUT:-60s}
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
